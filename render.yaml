services:
  # ── QuickHire Backend ────────────────────────────────────────────────────
  - type: web
    name: quickhire-backend
    runtime: docker
    dockerfilePath: ./quickhire-AI-mode /backend/Dockerfile
    dockerContext: ./quickhire-AI-mode /backend
    region: singapore
    plan: starter
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: MONGO_URI
        sync: false          # set in Render dashboard — never commit real URI
      - key: MONGO_DB
        value: quickhire
      - key: REDIS_URL
        sync: false          # set in Render dashboard
      - key: JWT_PRIVATE_KEY
        sync: false          # RS256 private key — set in Render dashboard
      - key: JWT_ALGORITHM
        value: RS256
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 30d
      - key: JWT_ISSUER
        value: quickhire.services
      - key: JWT_AUDIENCE
        value: quickhire-api
      - key: ALLOWED_ORIGINS
        sync: false          # comma-separated list of allowed frontend origins
      - key: LOG_LEVEL
        value: info
      - key: SMS_PROVIDER
        value: mock
      - key: RATE_LIMIT_PER_MIN
        value: 120
      - key: AWS_REGION
        value: ap-south-1
      # Payment gateways (set in dashboard)
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      # Optional services
      - key: SENTRY_DSN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: MEILISEARCH_URL
        sync: false
      - key: MEILISEARCH_KEY
        sync: false
