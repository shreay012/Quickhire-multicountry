global:
  scrape_interval: 15s
  evaluation_interval: 30s

rule_files:
  - alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: quickhire-api
    static_configs:
      - targets:
          - api:4000
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: redis
    static_configs:
      - targets:
          - redis-exporter:9121

  - job_name: mongodb
    static_configs:
      - targets:
          - mongodb-exporter:9216

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100
