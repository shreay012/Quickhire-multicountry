version: "3.9"
services:
  mongo:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: [mongo_data:/data/db]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  api:
    build: .
    env_file: .env
    ports: ["4000:4000"]
    depends_on: [mongo, redis]
    environment:
      MONGO_URI: mongodb://mongo:27017
      REDIS_URL: redis://redis:6379
volumes:
  mongo_data: {}
